name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install toolchain
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends kicad ngspice

      - name: Check toolchain presence
        run: |
          command -v kicad-cli \
            || { echo "ERROR: kicad-cli not found. In CI, this should be provided by the 'Install toolchain' step (apt package 'kicad') or the runner image. Please update that step or the image."; exit 1; }
          kicad-cli --version

          command -v ngspice \
            || { echo "ERROR: ngspice not found. In CI, this should be provided by the 'Install toolchain' step (apt package 'ngspice') or the runner image. Please update that step or the image."; exit 1; }
          ngspice --version

          command -v python \
            || { echo "ERROR: python not found. In CI, this should be provided by the 'Set up Python' step or the runner image. Please update that step or the image."; exit 1; }
          python --version

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests
        run: |
          pytest -q || exit_code=$?
          if [ "${exit_code:-0}" -ne 0 ] && [ "${exit_code:-0}" -ne 5 ]; then
            exit "${exit_code}"
          fi

      # Run @fast- and @schema-tagged scenarios first for quick fail-fast feedback.
      # continue-on-error ensures the full suite still runs (and the HTML report
      # is always produced), while the final check step re-fails the job if needed.
      - name: Run fast BDD scenarios
        id: fast_bdd
        continue-on-error: true
        run: behave --tags=@fast,@schema

      # Run the full suite (including @fast scenarios) for complete HTML reporting.
      - name: Run BDD scenarios
        run: behave -f behave_html_formatter:HTMLFormatter -o reports/behave-report.html

      - name: Upload behave reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: behave-reports
          path: reports/

      # Fail the job here if the fast scenarios step failed, so CI status is
      # still red even though the full suite and report upload ran to completion.
      - name: Check fast BDD scenarios result
        if: steps.fast_bdd.outcome == 'failure'
        run: |
          echo "Fast BDD scenarios failed. See the 'Run fast BDD scenarios' step for details."
          exit 1
