name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Check toolchain presence
        run: |
          command -v kicad-cli \
            || { echo "ERROR: kicad-cli not found. Please install KiCad (https://www.kicad.org/download/)."; exit 1; }
          kicad-cli --version

          command -v ngspice \
            || { echo "ERROR: ngspice not found. Please install ngspice (https://ngspice.sourceforge.io/)."; exit 1; }
          ngspice --version

          command -v python \
            || { echo "ERROR: python not found. Please install Python 3 (https://www.python.org/downloads/)."; exit 1; }
          python --version

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests
        run: |
          pytest -q || exit_code=$?
          if [ "${exit_code:-0}" -ne 0 ] && [ "${exit_code:-0}" -ne 5 ]; then
            exit "${exit_code}"
          fi
