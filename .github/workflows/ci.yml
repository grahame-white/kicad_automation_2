name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  fast-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Shared CI setup
        uses: ./.github/actions/ci-setup

      - name: Run tests
        run: |
          pytest -q || exit_code=$?
          if [ "${exit_code:-0}" -ne 0 ] && [ "${exit_code:-0}" -ne 5 ]; then
            exit "${exit_code}"
          fi

      - name: Run fast BDD scenarios
        run: behave --tags=@fast

  generate-matrix:
    needs: fast-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feature matrix
        id: set-matrix
        run: echo "matrix=$(python ci/generate_matrix.py)" >> $GITHUB_OUTPUT

  run-feature:
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Shared CI setup
        uses: ./.github/actions/ci-setup

      - name: Run BDD scenarios for feature shard
        run: behave ${{ matrix.feature }}/

      - name: Upload shard JUnit report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: junit-${{ strategy.job-index }}
          path: reports/junit/

  full-suite:
    needs: fast-check
    # Only run the serial full-suite (HTML report) on pushes to main.
    # PRs use the matrix sharding jobs (run-feature) for parallel per-feature coverage.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Shared CI setup
        uses: ./.github/actions/ci-setup

      - name: Run BDD scenarios
        run: behave -f behave_html_formatter:HTMLFormatter -o reports/behave-report.html

      - name: Upload behave reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: behave-reports
          path: reports/
