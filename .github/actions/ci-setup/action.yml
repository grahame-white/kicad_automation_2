name: CI setup
description: Shared setup steps for CI jobs (toolchain install, Python, dependencies)

runs:
  using: composite
  steps:
    - name: Install toolchain
      shell: bash
      run: |
        sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends kicad ngspice

    - name: Check toolchain presence
      shell: bash
      run: |
        command -v kicad-cli \
          || { echo "ERROR: kicad-cli not found. In CI, this should be provided by the 'Install toolchain' step (apt package 'kicad') or the runner image. Please update that step or the image."; exit 1; }
        kicad-cli --version

        command -v ngspice \
          || { echo "ERROR: ngspice not found. In CI, this should be provided by the 'Install toolchain' step (apt package 'ngspice') or the runner image. Please update that step or the image."; exit 1; }
        ngspice --version

        command -v python \
          || { echo "ERROR: python not found. In CI, this should be provided by the 'Set up Python' step or the runner image. Please update that step or the image."; exit 1; }
        python --version

    - name: Install dependencies
      shell: bash
      run: |
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
